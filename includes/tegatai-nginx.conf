# --- TEGATAI SECURITY RULES (2026-03-19 15:02:28) ---
# Include this file in your Nginx server block:
# include /var/customers/webs/animemitsuketa/anime-mitsuketa.tokyo/tegatai-nginx.conf;

# Disable indexing
add_header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive" always;
location ~* \.(log|ini|sql|env|sh|bak|old|git)$ { deny all; access_log off; log_not_found off; return 403; }
location ~* /(readme\.html|license\.txt|wp-config\.php|install\.php)$ { deny all; access_log off; log_not_found off; return 403; }
location ~ /\. { deny all; access_log off; log_not_found off; return 403; }
location = /xmlrpc.php { deny all; access_log off; log_not_found off; return 403; }
location ~ ^/wp-content/uploads/tegatai-backups/ { deny all; access_log off; log_not_found off; return 403; }
location ~ ^/wp-content/uploads/tegatai-logs/ { deny all; access_log off; log_not_found off; return 403; }
location ~ ^/wp-content/uploads/tegatai-quarantine/ { deny all; access_log off; log_not_found off; return 403; }
location ~ ^/wp-content/uploads/.+\.php$ { deny all; access_log off; log_not_found off; return 403; }
if ($http_user_agent ~* "(sqlmap|nikto|wpscan|python|curl|wget|libwww|acunetix|havij|winhttp|indy|mail.ru|scooter|mj12bot|ahrefs|semalt)") { return 403; }
location ^~ /wp-content/uploads/tegatai-backups/ { deny all; return 403; }
# --- END TEGATAI RULES ---
